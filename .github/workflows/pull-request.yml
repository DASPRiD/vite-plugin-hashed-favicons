name: Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Biome CI
        run: pnpm biome ci .

      - name: Test
        run: pnpm test

      - name: Type Check
        run: pnpm tsc --noEmit
